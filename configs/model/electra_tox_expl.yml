class_path: chebai.models.Electra
init_args:
  model_type: classification
  optimizer_kwargs:
    lr: 1e-4
    weight_decay: 0.0001
  config:
    vocab_size: 1400
    max_position_embeddings: 1800
    num_attention_heads: 8
    num_hidden_layers: 6
    type_vocab_size: 1
    hidden_size: 256
    hidden_dropout_prob: 0.4
    word_dropout: 0.2
