- class_path: chebai.callbacks.model_checkpoint.CustomModelCheckpoint
  init_args:
    monitor: val_loss
    mode: 'min'
    filename: 'best_loss_{epoch:02d}_{val_loss:.4f}_{val_mse:.4f}_{val_rmse:.4f}_{val_r2:.4f}'
    every_n_epochs: 1
    save_top_k: 3
- class_path: chebai.callbacks.model_checkpoint.CustomModelCheckpoint
  init_args:
    monitor: val_r2
    mode: 'max'
    filename: 'best_r2_{epoch:02d}_{val_loss:.4f}_{val_mse:.4f}_{val_rmse:.4f}_{val_r2:.4f}'
    every_n_epochs: 1
    save_top_k: 3
- class_path: chebai.callbacks.model_checkpoint.CustomModelCheckpoint
  init_args:
    filename: 'per_{epoch:02d}_{val_loss:.4f}_{val_mse:.4f}_{val_rmse:.4f}_{val_r2:.4f}'
    every_n_epochs: 25
    save_top_k: -1
