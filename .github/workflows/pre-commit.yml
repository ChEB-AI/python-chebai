name: Pre-commit Check

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run pre-commit
      uses: pre-commit/action@v3.0.1
